kind = "web"
previewPath = "/"
title = "Harriubg"
version = "1.0.0"
id = "artifacts/harriubg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26170

[services.development]
run = "pnpm --filter @workspace/harriubg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/harriubg", "run", "build" ]
publicDir = "artifacts/harriubg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26170"
BASE_PATH = "/"
